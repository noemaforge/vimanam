name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches crate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "Tag version:   $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION. Bump Cargo.toml (and Cargo.lock) to match the tag before releasing."
            exit 1
          fi

  create-release:
    name: Create Release
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md
          NOTES="$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag
          ' CHANGELOG.md)"
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Vimanam ${{ github.ref_name }}" \
            --notes "$NOTES

          ---
          Compressed archives (\`.tar.gz\` for Linux/macOS, \`.zip\` for Windows) with per-asset \`.sha256\` checksums for Linux, macOS (Intel & Apple Silicon), and Windows are attached. Also available via \`cargo install vimanam\`."

  publish-crate:
    name: Publish to crates.io
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-03-27
        with:
          toolchain: stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vimanam

          # Windows (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vimanam.exe

          # macOS (Intel x86_64)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vimanam

          # macOS (ARM64 / Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vimanam

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-03-27
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package and upload release archive
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="${{ matrix.artifact_name }}"
          TARGET="${{ matrix.target }}"
          # cargo-binstall-friendly name: vimanam-<version>-<target-triple>
          STAGE="vimanam-${VERSION}-${TARGET}"

          # Stage the binary alongside the docs/license.
          mkdir "$STAGE"
          cp "target/${TARGET}/release/${BIN}" "$STAGE/"
          cp README.md LICENSE "$STAGE/"

          if [ "${{ runner.os }}" = "Windows" ]; then
            ARCHIVE="${STAGE}.zip"
            7z a "$ARCHIVE" "$STAGE" >/dev/null
          else
            ARCHIVE="${STAGE}.tar.gz"
            tar -czf "$ARCHIVE" "$STAGE"
          fi

          # Per-asset SHA256 checksum (sha256sum on Linux/Windows-bash, shasum on macOS).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi

          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" "${ARCHIVE}.sha256" --clobber
